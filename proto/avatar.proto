syntax = "proto3";

package avatar;

message AvatarConfig {
  Head head = 1;
  Body body = 2;
  Face face = 3;
  FacialHair facial_hair = 4;
  Accessory accessory = 5;

  // Colors — only included when overriding defaults
  optional string skin_color = 10;
  optional string outline_color = 11;
  optional string top_color = 12;
  optional string jacket_color = 13;
  optional string hair_color = 14;
  optional string hat_color = 15;
  optional string beard_color = 16;
  optional string accessory_color = 17;
  optional string prop_color = 18;
  optional string background_color = 19;
}

